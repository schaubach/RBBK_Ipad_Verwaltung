version: '3.8'

services:
  # Nginx Reverse Proxy - EINZIGER öffentlicher Eintrittspunkt
  nginx:
    image: nginx:alpine
    container_name: ipad_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - ipad_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend - NUR intern erreichbar
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ipad_backend
    environment:
      - MONGO_URL=mongodb://mongodb:27017/iPadDatabase
      - DB_NAME=iPadDatabase
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ../backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - ipad_network
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/auth/setup"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB Datenbank - NUR intern erreichbar (keine Auth nötig, da isoliert)
  mongodb:
    image: mongo:6
    container_name: ipad_mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - ipad_network
    expose:
      - "27017"

  # Frontend Build Container
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=
    container_name: ipad_frontend_build
    volumes:
      - frontend_build:/app/build
    networks:
      - ipad_network

networks:
  ipad_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local
  frontend_build:
    driver: local
