version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ipad-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ipad-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipad-backend
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=iPadDatabase
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123}
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - ipad-network
    # Port 8001 nur intern im Docker-Netzwerk verfügbar
    expose:
      - "8001"

  # MongoDB Datenbank
  mongodb:
    image: mongo:6
    container_name: ipad-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - ipad-network
    # Port nur intern im Docker-Netzwerk verfügbar
    expose:
      - "27017"

networks:
  ipad-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
