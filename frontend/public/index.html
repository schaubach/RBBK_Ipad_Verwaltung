<!doctype html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#379683" />
        <meta name="description" content="iPad-Verwaltung - RBBK Dortmund" />
        
        <!-- 
        Content Security Policy
        ========================
        Diese CSP ist für beide Szenarien konfiguriert:
        - Docker/Intranet: Same-Origin API (/api/*)
        - Entwicklung: Cross-Origin API (localhost:8001, preview.emergentagent.com)
        
        In Docker (Nginx Reverse Proxy) ist nur 'self' nötig.
        Für Entwicklung/Preview werden zusätzliche Origins erlaubt.
        
        Hinweis: frame-ancestors und X-Frame-Options funktionieren nur via HTTP-Header (Nginx).
        -->
        <meta http-equiv="Content-Security-Policy" content="
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval';
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            img-src 'self' blob: data: https: http:;
            font-src 'self' data: https://fonts.gstatic.com;
            connect-src 'self' https://*.emergentagent.com https://*.rbbk-do.de wss://*.emergentagent.com;
            object-src 'none';
            frame-src 'none';
            base-uri 'self';
            form-action 'self';
        ">
        
        <meta http-equiv="X-Content-Type-Options" content="nosniff" />
        <meta name="referrer" content="strict-origin-when-cross-origin" />
        
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        
        <title>iPad-Verwaltung - RBBK Dortmund</title>
        
        <!-- Runtime Configuration - MUSS VOR React geladen werden -->
        <script src="%PUBLIC_URL%/config.js"></script>
    </head>
    <body>
        <noscript>Sie müssen JavaScript aktivieren, um diese Anwendung zu nutzen.</noscript>
        <div id="root"></div>
        
        <!-- RBBK Logo Badge -->
        <a
            id="rbbk-badge"
            target="_blank"
            href="https://www.rbbk-dortmund.de"
            style="
                display: flex !important;
                align-items: center !important;
                position: fixed !important;
                bottom: 20px;
                right: 20px;
                text-decoration: none;
                padding: 6px 10px;
                z-index: 9999 !important;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15) !important;
                border-radius: 8px !important;
                background-color: #ffffff !important;
                border: 1px solid rgba(0, 0, 0, 0.1) !important;
            "
        >
            <img
                style="height: 24px; width: auto;"
                src="%PUBLIC_URL%/rbbk-logo.png"
                alt="RBBK Logo"
            />
        </a>
    </body>
</html>
